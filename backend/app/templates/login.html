<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; perspective: 1000px; }
        .login-card { background: rgba(15, 23, 42, 0.95); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid rgba(168, 85, 247, 0.3); transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease; transform-style: preserve-3d; }
        .login-card:hover { box-shadow: 20px 25px 40px rgba(0,0,0,0.7), -10px -10px 30px rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.8); }
        .login-card.leave { transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease, border-color 0.5s ease; }
        h1 { text-align: center; color: #a855f7; margin-top: 0; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        label { font-size: 0.9rem; color: #94a3b8; }
        input { padding: 0.8rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #a855f7; }
        button { padding: 0.8rem; border-radius: 6px; border: none; background: linear-gradient(135deg, #3b82f6, #a855f7); color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .error { color: #ef4444; text-align: center; margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin Portal</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/login" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        const card = document.querySelector('.login-card');
        
        card.addEventListener('mousemove', (e) => {
            card.classList.remove('leave');
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            // Calculate tilt based on mouse position relative to center
            const rotateX = ((y - centerY) / centerY) * -12; // up to 12 deg tilt
            const rotateY = ((x - centerX) / centerX) * 12;
            
            card.style.transform = `perspective(1000px) translateY(-10px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        
        card.addEventListener('mouseleave', () => {
            card.classList.add('leave');
            card.style.transform = `perspective(1000px) translateY(0) rotateX(0deg) rotateY(0deg)`;
        });
    </script>
</body>
</html>
